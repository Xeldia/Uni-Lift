services:
  - type: web
    name: unilift
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerBuildArgs:
      - key: VITE_SUPABASE_URL
        fromEnvVar: VITE_SUPABASE_URL
      - key: VITE_SUPABASE_ANON_KEY
        fromEnvVar: VITE_SUPABASE_ANON_KEY
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
