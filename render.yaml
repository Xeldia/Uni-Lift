services:
  # ── Backend: Node.js API ──────────────────────────────────────────────────────
  - type: web
    name: unilift-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false

  # ── Frontend: Static Site (served via `serve`) ───────────────────────────────
  - type: web
    name: unilift-frontend
    runtime: node
    rootDir: Frontend
    buildCommand: npm ci && npm run build
    startCommand: npx serve -s dist -l $PORT
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_API_BASE_URL
        sync: false
