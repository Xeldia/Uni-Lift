services:
  # ── Backend: Docker ───────────────────────────────────────────────────────────
  - type: web
    name: unilift-backend
    runtime: docker
    rootDir: Backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false

  # ── Frontend: Docker (Vite build + serve) ─────────────────────────────────────
  - type: web
    name: unilift-frontend
    runtime: docker
    rootDir: Frontend
    dockerfilePath: ./Dockerfile
    dockerBuildArgs:
      - key: VITE_SUPABASE_URL
        value: ""
      - key: VITE_SUPABASE_ANON_KEY
        value: ""
      - key: VITE_API_BASE_URL
        value: ""
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_API_BASE_URL
        sync: false
